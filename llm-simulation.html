<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大模型执行流程</title>
  <style>
    :root {
      --cuda: #76b900; --cann: #e60012;
      --bg: #f8f9fc; --text: #1a1d26; --muted: #5c6370;
      --border: #e2e6ef; --accent: #3b5bdb; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, #1a1d26 0%, #2d3561 100%);
      color: #fff; padding: 1.5rem 2rem;
    }
    header a { color: rgba(255,255,255,.85); font-size: .82rem; }
    .container { max-width: 820px; margin: 0 auto; padding: 1.5rem; }
    .meta { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .75rem; align-items: center; }
    .badge {
      font-size: .72rem; font-weight: 700; padding: .2rem .55rem;
      border-radius: 5px; background: rgba(255,255,255,.15);
    }
    .badge.stack-cuda { background: var(--cuda); color: #1a3d00; }
    .badge.stack-cann { background: #ff6b7a; color: #fff; }
    .badge.type-ask { background: #edf2ff; color: #3b5bdb; }
    .badge.type-task { background: #ecfdf5; color: #047857; }
    .badge.live { background: #fef3c7; color: #92400e; }
    h1 { font-size: 1.25rem; margin-top: .5rem; max-width: 720px; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: .5rem; margin: 1rem 0;
    }
    .btn {
      font-size: .78rem; padding: .4rem .85rem; border-radius: 6px;
      border: 1px solid var(--border); background: #fff; cursor: pointer;
    }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn:disabled { opacity: .55; cursor: wait; }
    .env-box, .prompt-box, .note-box {
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.15rem; margin-bottom: 1rem;
    }
    .note-box { background: #fffbeb; border-color: #fde68a; font-size: .8rem; color: #78350f; }
    .prompt-box { border-left: 4px solid var(--accent); }
    .env-box { font-size: .78rem; color: var(--muted); }
    .label { font-size: .72rem; font-weight: 700; color: var(--muted); margin-bottom: .35rem; }
    .timeline { position: relative; padding-left: 1.5rem; }
    .timeline::before {
      content: ""; position: absolute; left: .45rem; top: .5rem; bottom: .5rem;
      width: 2px; background: var(--border);
    }
    .step {
      position: relative; margin-bottom: 1rem;
      background: #fff; border: 1px solid var(--border);
      border-radius: 10px; padding: .85rem 1rem;
    }
    .step::before {
      content: ""; position: absolute; left: -1.35rem; top: 1rem;
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; border: 2px solid var(--accent);
    }
    .step.kind-think::before { border-color: #7c3aed; }
    .step.kind-search::before { border-color: #2563eb; }
    .step.kind-tool::before { border-color: #d97706; }
    .step.kind-reply::before { border-color: #059669; }
    .step.kind-outcome::before { border-color: #e60012; background: #e60012; }
    .step-head { font-size: .68rem; font-weight: 800; letter-spacing: .04em; margin-bottom: .4rem; }
    .step.kind-think .step-head { color: #7c3aed; }
    .step.kind-search .step-head { color: #2563eb; }
    .step.kind-tool .step-head { color: #d97706; }
    .step.kind-reply .step-head { color: #059669; }
    .step-body { font-size: .84rem; color: #374151; white-space: pre-wrap; word-break: break-word; }
    .cmd-block {
      margin-top: .5rem; background: #1e1e1e; color: #d4d4d4;
      border-radius: 6px; padding: .65rem; font-size: .72rem;
      overflow: auto; max-height: 280px;
    }
    .cmd-block .cmd { color: #9cdcfe; margin-bottom: .35rem; }
    .cmd-block .out { color: #ce9178; }
    .cmd-block .err { color: #f48771; }
    .outcome-bar {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: var(--radius); padding: 1rem 1.15rem; margin-top: 1rem;
    }
    .outcome-bar b { display: block; font-size: .75rem; color: #047857; margin-bottom: .35rem; }
    .loading { text-align: center; padding: 3rem; color: var(--muted); }
    .error-box {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: var(--radius); padding: 1.5rem; color: #991b1b;
    }
    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: .8rem; }
  </style>
</head>
<body>
  <header>
    <div class="container" style="padding:0;">
      <a href="operator-novice-workflow.html">← 返回 Workflow</a>
      <div class="meta" id="meta"></div>
      <h1 id="title">加载中…</h1>
    </div>
  </header>
  <div class="container" id="content"><div class="loading" id="status">正在读取已保存的执行记录…</div></div>
  <footer>CUDA vs CANN · 真实任务执行 · 过程记录</footer>

  <script src="llm-simulations-data.js"></script>
  <script>
    const KIND_LABEL = {
      think: '💭 理解意图',
      search: '🔍 检索资料',
      tool: '🔧 工具调用',
      reply: '💬 回复用户',
      outcome: '✅ 环节结论'
    };
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const forceRun = params.get('run') === '1';
    const root = document.getElementById('content');

    async function loadRecord() {
      if (!id) throw new Error('缺少 id 参数');
      const status = document.getElementById('status');
      if (!forceRun) {
        if (status) status.textContent = '正在读取已保存的执行记录（simulation-records/' + id + '.json）…';
        try {
          const r = await fetch('simulation-records/' + id + '.json?_=' + Date.now());
          if (r.ok) return { record: await r.json(), source: 'record' };
        } catch (_) {}
      } else if (status) {
        status.textContent = '正在重新执行任务（需 runner/server.py 运行中）…';
      }
      try {
        if (status) status.textContent = '未找到记录，尝试实时执行…';
        const r = await fetch('/api/run/' + id, { method: 'POST' });
        if (r.ok) return { record: await r.json(), source: 'live' };
      } catch (_) {}
      if (LLM_SIMS[id]) {
        if (status) status.textContent = '使用静态示例数据…';
        return { record: LLM_SIMS[id], source: 'fallback' };
      }
      throw new Error('未找到任务：' + id);
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(s) {
      return esc(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
          return '<pre class="cmd-block"><code>' + esc(code) + '</code></pre>';
        });
    }

    function cmdBlock(step) {
      if (!step.command && !step.stdout && !step.stderr && !step.url && !step.page_summary) return '';
      let h = '<div class="cmd-block">';
      if (step.page_index) {
        h += '<div class="cmd">📄 检索 ' + step.page_index + '/' + step.page_total + ' · ' + esc(step.page_name || '') + '</div>';
      }
      if (step.command) h += '<div class="cmd">$ ' + esc(step.command) + '</div>';
      if (step.url) {
        h += '<div class="cmd">GET ' + esc(step.url) + '</div>';
        if (step.final_url && step.final_url !== step.url) {
          h += '<div class="out">→ ' + esc(step.final_url) + '</div>';
        }
      }
      if (step.status) h += '<div class="out">HTTP ' + esc(step.status) + (step.title ? ' · ' + esc(step.title) : '') + '</div>';
      if (step.found_keywords && step.found_keywords.length) {
        h += '<div class="out">命中关键词：' + esc(step.found_keywords.join(', ')) + '</div>';
      }
      if (step.snippet) h += '<div class="out">' + esc(step.snippet) + '</div>';
      if (step.page_summary) {
        h += '<div class="out">页面清单：\n' + esc(JSON.stringify(step.page_summary, null, 2)) + '</div>';
      }
      if (step.stdout) h += '<div class="out">' + esc(step.stdout) + '</div>';
      if (step.stderr) h += '<div class="err">' + esc(step.stderr) + '</div>';
      if (step.exit_code != null) h += '<div class="out">exit_code: ' + step.exit_code + '</div>';
      return h + '</div>';
    }

    function countSearchSteps(rec) {
      return (rec.steps || []).filter(function (s) { return s.kind === 'search'; }).length;
    }

    function render(rec, source) {
      document.title = (rec.stack || '') + ' · 真实执行记录';
      document.getElementById('title').textContent = rec.prompt;
      const stackCls = rec.stack === 'CUDA' ? 'stack-cuda' : 'stack-cann';
      const srcBadge = source === 'record' ? '已记录' : source === 'live' ? '刚执行' : '静态回退';
      document.getElementById('meta').innerHTML =
        '<span class="badge ' + stackCls + '">' + esc(rec.stack) + '</span>' +
        '<span class="badge">' + esc(rec.scene) + '</span>' +
        '<span class="badge type-' + esc(rec.type) + '">' + (rec.type === 'ask' ? '问' : '做') + '</span>' +
        '<span class="badge live">' + srcBadge + '</span>';

      let html = '<div class="toolbar">' +
        '<button class="btn primary" id="rerun">重新执行</button>' +
        '<a class="btn" href="simulation-records/' + id + '.json" target="_blank">查看 JSON</a></div>';

      const nSearch = countSearchSteps(rec);
      if (nSearch > 0) {
        html += '<div class="note-box"><b>与 Claude 的差异说明</b><br>'
          + '本页为<strong>真实执行记录</strong>：「查官方文档」类任务会逐步展示 '
          + nSearch + ' 个页面的 HTTP 检索（类似 Claude 的多轮 Web Search）。'
          + '差异在于：Claude 会<strong>动态决定</strong>搜哪些页、读社区/Issue、结合对话上下文；'
          + '这里是<strong>预定义检索计划 + 真实抓取</strong>，不含 LLM 自由推理。'
          + '「问 AI / IDE Agent」类任务以本机命令和仓库扫描为主。</div>';
      }
      if (rec.environment) {
        html += '<div class="env-box"><div class="label">运行环境（实测）</div>' +
          esc(JSON.stringify(rec.environment, null, 2)) + '</div>';
      }
      if (rec.started_at) {
        html += '<div class="env-box"><div class="label">执行时间</div>' +
          esc(rec.started_at) + ' → ' + esc(rec.finished_at || '') + '</div>';
      }

      html += '<div class="prompt-box"><div class="label">👤 开发者输入</div><p>' + esc(rec.prompt) + '</p></div>';
      html += '<div class="timeline">';
      (rec.steps || []).forEach(function (s) {
        html += '<div class="step kind-' + s.kind + '">' +
          '<div class="step-head">' + KIND_LABEL[s.kind] + (s.ts ? ' · ' + esc(s.ts) : '') + '</div>' +
          '<div class="step-body">' + fmt(s.text) + cmdBlock(s) + '</div></div>';
      });
      html += '</div>';
      html += '<div class="outcome-bar"><b>本环节产出</b>' + esc(rec.outcome) + '</div>';
      root.innerHTML = html;
      document.getElementById('rerun').onclick = function () {
        location.href = 'llm-simulation.html?id=' + encodeURIComponent(id) + '&run=1';
      };
    }

    loadRecord().then(function ({ record, source }) {
      render(record, source);
    }).catch(function (err) {
      root.innerHTML = '<div class="error-box"><p>' + esc(err.message) + '</p>' +
        '<p style="margin-top:.75rem;font-size:.85rem;">请先运行：<code>python3 runner/cli.py ' + esc(id) + '</code><br>' +
        '或启动：<code>python3 runner/server.py</code> 后点击「重新执行」</p></div>';
    });
  </script>
</body>
</html>
